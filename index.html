<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লাইভ টিভি প্লেয়ার - ক্যাটাগরিসহ</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- HLS.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0d0f12;
      color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px 10px;
    }

    .player-container {
      width: 100%;
      max-width: 960px;
      background: #161a23;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }

    /* Video Wrapper */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background-color: #000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      outline: none;
    }

    /* Controls Panel */
    .controls-panel {
      padding: 24px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .channel-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-badge {
      background: #ef4444;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* Category Filter Buttons Styling */
    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .category-tabs::-webkit-scrollbar {
      height: 4px;
    }
    .category-tabs::-webkit-scrollbar-thumb {
      background: #2d3748;
      border-radius: 4px;
    }

    .cat-tab {
      background: #1f2430;
      color: #9ca3af;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .cat-tab:hover {
      background: #282f3f;
      color: #fff;
    }

    .cat-tab.active {
      background: #10b981;
      color: #000;
      font-weight: 600;
      border-color: #10b981;
    }

    /* Playlist Grid Layout */
    .playlist {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      max-height: 250px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .playlist::-webkit-scrollbar {
      width: 6px;
    }
    .playlist::-webkit-scrollbar-track {
      background: #111318;
      border-radius: 8px;
    }
    .playlist::-webkit-scrollbar-thumb {
      background: #2d3748;
      border-radius: 8px;
    }

    /* Channel Button */
    .channel-btn {
      background: #1f2430;
      color: #d1d5db;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 0.92rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }

    .channel-btn .ch-info {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .channel-btn .ch-number {
      background: rgba(255, 255, 255, 0.08);
      color: #9ca3af;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      min-width: 28px;
      text-align: center;
    }

    .channel-btn .ch-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-btn .play-icon {
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s ease;
      color: #10b981;
    }

    .channel-btn:hover {
      background: #282f3f;
      border-color: rgba(16, 185, 129, 0.3);
      color: #ffffff;
      transform: translateY(-2px);
    }

    .channel-btn:hover .play-icon {
      opacity: 0.6;
    }

    .channel-btn.active {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
      color: #10b981;
      font-weight: 600;
      border-color: #10b981;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }

    .channel-btn.active .ch-number {
      background: #10b981;
      color: #000000;
    }

    .channel-btn.active .play-icon {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .controls-panel { padding: 16px; }
      .playlist { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="player-container">
    <div class="video-wrapper">
      <video id="video" controls autoplay muted></video>
    </div>

    <div class="controls-panel">
      <div class="header-bar">
        <div class="channel-title">
          <i class="fa-solid fa-tv" style="color: #10b981;"></i>
          <span id="current-channel">Select Channel</span>
        </div>
        <span class="live-badge"><i class="fa-solid fa-circle" style="font-size: 8px; vertical-align: middle;"></i> LIVE</span>
      </div>

      <!-- Category Filter Tabs Container -->
      <div class="category-tabs" id="category-tabs">
        <!-- JS দিয়ে ক্যাটগরি তৈরি হবে -->
      </div>

      <!-- Channels List Container -->
      <div class="playlist" id="playlist">
        <!-- JS দিয়ে চ্যানেল তৈরি হবে -->
      </div>
    </div>
  </div>

  <script>
    // ১. ক্যাটাগরিসহ চ্যানেলগুলোর লিস্ট
    const channels = [
      {
        name: "BTV HD",
        category: "Sports",
        url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/1709.m3u8"
      },
      { 
        name: "Jumuna TV",
        category: "NEWS",
          url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8"
      },
      {
        name: "ZEE BANGLA HD",
        category: "DRAMA",
        url: "https://stream.ottplus.bd/live/zee_bangla_abr/live/zee_bangla_720/chunks.m3u8"
      },
      {
        name: "Euro Sports",
        category: "Sports",
        url: "https://stream.ottplus.bd/live/euro_sports_hd_abr/live/euro_sports_hd/chunks.m3u8"
      },
      {
        name: "TNT SPORTS 3",
        category: "Sports",
        url: "https://bein-esp-xumo.amagi.tv/playlistR720P.m3u8"
      },
      { 
        name: "Chennal 1",
        category: "NEWS",
          url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"
      },
      { 
        name: "Al-Jazeera",
        category: "NEWS",
          url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8"
      },
    ];

    const video = document.getElementById('video');
    const playlistContainer = document.getElementById('playlist');
    const categoryTabsContainer = document.getElementById('category-tabs');
    const channelTitle = document.getElementById('current-channel');
    let hls = null;
    let currentPlayingUrl = '';

    // ২. ভিডিও প্লে করার ফাংশন
    function loadStream(url, name) {
      channelTitle.textContent = name;
      currentPlayingUrl = url;

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      }
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function () {
          video.play();
        });
      } else {
        alert("আপনার ব্রাউজারে HLS সাপোর্ট করে না!");
      }
    }

    // ৩. নির্দিষ্ট ক্যাটাগরি অনুযায়ী চ্যানেল রেন্ডার করা
    function renderChannels(selectedCategory = "All") {
      playlistContainer.innerHTML = '';

      const filteredChannels = selectedCategory === "All" 
        ? channels 
        : channels.filter(ch => ch.category === selectedCategory);

      filteredChannels.forEach((channel, index) => {
        const btn = document.createElement('button');
        const isActive = channel.url === currentPlayingUrl;
        
        btn.className = 'channel-btn' + (isActive ? ' active' : '');
        btn.innerHTML = `
          <div class="ch-info">
            <span class="ch-number">${(index + 1).toString().padStart(2, '0')}</span>
            <span class="ch-name">${channel.name}</span>
          </div>
          <i class="fa-solid fa-play play-icon"></i>
        `;

        btn.addEventListener('click', () => {
          document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadStream(channel.url, channel.name);
        });

        playlistContainer.appendChild(btn);
      });
    }

    // ৪. ক্যাটাগরি বাটন ফিল্টার তৈরি করা
    function renderCategoryTabs() {
      // ইউনিক ক্যাটাগরি ফিল্টার বের করা
      const categories = ["All", ...new Set(channels.map(ch => ch.category))];

      categories.forEach((cat, index) => {
        const tab = document.createElement('button');
        tab.className = 'cat-tab' + (index === 0 ? ' active' : '');
        tab.textContent = cat;

        tab.addEventListener('click', () => {
          document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderChannels(cat);
        });

        categoryTabsContainer.appendChild(tab);
      });
    }

    // ইনিশিয়াল লোড
    renderCategoryTabs();
    renderChannels("All");
    loadStream(channels[0].url, channels[0].name);
  </script>

</body>
</html>
