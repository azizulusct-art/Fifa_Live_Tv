<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>লাইভ টিভি প্লেয়ার (HLS.js Demo)</title>
  
  <!-- HLS.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .player-container {
      width: 100%;
      max-width: 900px;
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background-color: #000;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      outline: none;
    }

    .controls-panel {
      padding: 20px;
    }

    .channel-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #00e676;
    }

    .playlist {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .channel-btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }

    .channel-btn:hover {
      background: #333;
      border-color: #00e676;
    }

    .channel-btn.active {
      background: #00e676;
      color: #000;
      font-weight: bold;
      border-color: #00e676;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <!-- Video Player Container -->
    <div class="video-wrapper">
      <video id="video" controls autoplay muted></video>
    </div>

    <!-- Channel Selector Controls -->
    <div class="controls-panel">
      <h3 id="current-channel" class="channel-title">এখন চলছে: Select Channel</h3>
      <div class="playlist" id="playlist">
        <!-- Buttons will be dynamically generated by JS -->
      </div>
    </div>
  </div>

  <script>
    // ডেমো লাইভ টিভি চ্যানলগুলোর m3u8 স্ট্রিম ইউআরএল
    const channels = [
      {
        name: "BTV HD",
        url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/1709.m3u8"
      },
      {
        name: "ZEE BANGLA HD",
        url: "https://stream.ottplus.bd/live/zee_bangla_abr/live/zee_bangla_720/chunks.m3u8"
      },
      {
        name: "SKY SPORTS CRICKET",
        url: "http://sewv654wfcsdwfi87fwvgbngh.siauliairsavlt.pw/iptv/VCQ4ADX96VH4G8PY7URBWRQU/9258/index.m3u8"
      }
    ];

    const video = document.getElementById('video');
    const playlistContainer = document.getElementById('playlist');
    const channelTitle = document.getElementById('current-channel');
    let hls = null;

    // স্ট্রিম প্লে করার মূল ফাংশন
    function loadStream(url, name) {
      channelTitle.textContent = `এখন চলছে: ${name}`;

      if (Hls.isSupported()) {
        if (hls) {
          hls.destroy(); // আগের স্ট্রিম বন্ধ করা
        }
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play();
        });
      }
      // Safari এবং iOS ব্রাউজারের নিজস্ব HLS সাপোর্ট থাকে
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function () {
          video.play();
        });
      } else {
        alert("আপনার ব্রাউজারে HLS সাপোর্ট করে না!");
      }
    }

    // চ্যানেল বাটনগুলো তৈরি করা
    channels.forEach((channel, index) => {
      const btn = document.createElement('button');
      btn.className = 'channel-btn' + (index === 0 ? ' active' : '');
      btn.textContent = channel.name;

      btn.addEventListener('click', () => {
        // Active ক্লাস আপডেট করা
        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // স্ট্রিম লোড করা
        loadStream(channel.url, channel.name);
      });

      playlistContainer.appendChild(btn);
    });

    // প্রথম চ্যানেলটি ডিফল্ট চালু হওয়া
    loadStream(channels[0].url, channels[0].name);
  </script>

</body>
</html>
